<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Management</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: white; padding: 24px; border-radius: 10px; }
    h1 { color: #1f3d7a; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 14px; border: none; border-radius: 6px; color: white; background: #2563eb; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #eff6ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Trip Management</h1>

    <form>
      <div class="grid">
        <div>
          <label>Source</label>
          <input placeholder="Enter source" />
        </div>
        <div>
          <label>Destination</label>
          <input placeholder="Enter destination" />
        </div>
        <div>
          <label>Assigned Vehicle</label>
          <input placeholder="Vehicle number" />
        </div>
        <div>
          <label>Assigned Driver</label>
          <input placeholder="Driver name" />
        </div>
        <div>
          <label>Cargo Weight</label>
          <input type="number" placeholder="kg" />
        </div>
        <div>
          <label>Planned Distance</label>
          <input type="number" placeholder="km" />
        </div>
        <div>
          <label>Trip Status</label>
          <select>
            <option>Draft</option>
            <option>Dispatched</option>
            <option>Completed</option>
            <option>Cancelled</option>
          </select>
        </div>
      </div>

      <button type="submit">Create Trip</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Trip ID</th>
          <th>Source</th>
          <th>Destination</th>
          <th>Vehicle</th>
          <th>Driver</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>TRIP-001</td>
          <td>Surat</td>
          <td>Ahmedabad</td>
          <td>MH-01-AB-1234</td>
          <td>Ravi Patel</td>
          <td>Completed</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
