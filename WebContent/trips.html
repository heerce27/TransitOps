<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps Trips</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-shell">
    <div class="hero-card">
      <span class="eyebrow">Trip control</span>
      <h1>Trip Management</h1>
      <p>Welcome, {{USER_NAME}}</p>
      <p>Role: {{USER_ROLE}}</p>
      <p>Email: {{USER_EMAIL}}</p>
      <div class="hero-actions">
        <a class="btn-secondary" href="dashboard.html">Back to Dashboard</a>
        <a class="btn-secondary" href="login.html">Logout</a>
      </div>
    </div>

    <div class="panel">
      <h2>Create Trip</h2>
      <div class="notice">{{MESSAGE}}</div>
      <form action="/trips" method="post">
        <div class="form-grid">
          <div><label>Route</label><input type="text" name="route" required></div>
          <div><label>Vehicle</label><input type="text" name="vehicle" required></div>
          <div><label>Driver</label><input type="text" name="driver"></div>
          <div><label>Status</label><select name="status"><option value="Scheduled">Scheduled</option><option value="Dispatched">Dispatched</option><option value="Completed">Completed</option></select></div>
        </div>
        <div class="form-buttons"><button type="submit" class="btn-primary">Save Trip</button></div>
      </form>
    </div>

    <div class="panel">
      <h2>Trip Records</h2>
      <ul>{{TRIP_LIST}}</ul>
    </div>
  </div>
</body>
</html>
