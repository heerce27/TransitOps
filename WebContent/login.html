<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps Login</title>
</head>
<body>
  <h1>TransitOps</h1>
  <h2>Smart Transport Operations Platform</h2>
  <p>Please sign in to continue.</p>

  <form action="/login" method="post">
    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Login</button>
  </form>

  <p>Demo accounts:</p>
  <ul>
    <li>fleetmanager@transitops.com / Fleet@2026</li>
    <li>driver@transitops.com / Driver@2026</li>
    <li>safety@transitops.com / Safety@2026</li>
    <li>analyst@transitops.com / Analyst@2026</li>
  </ul>
</body>
</html>
