<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-shell">
    <div class="hero-card auth-card">
      <span class="eyebrow">Secure access</span>
      <h1>TransitOps</h1>
      <h2>Smart Transport Operations Platform</h2>
      <p>Sign in with your registered account to manage vehicles, drivers, trips, maintenance, and more.</p>
      {{MESSAGE}}
      <form action="/login" method="post" class="panel">
        <div class="form-grid">
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
          </div>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn-primary">Login</button>
          <a class="btn-secondary" href="register.html">Create Account</a>
        </div>
      </form>
      <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>
</body>
</html>
