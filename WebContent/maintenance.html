<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps Maintenance</title>
</head>
<body>
  <h1>Maintenance Module</h1>
  <p>Welcome, {{USER_NAME}}</p>
  <p>Role: {{USER_ROLE}}</p>
  <p>Email: {{USER_EMAIL}}</p>
  <p><a href="/dashboard">Back to Dashboard</a> | <a href="/logout">Logout</a></p>

  <h2>Schedule Maintenance</h2>
  {{MESSAGE}}

  <form action="/maintenance" method="post">
    <label>Vehicle</label><br>
    <input type="text" name="vehicle" required><br><br>

    <label>Maintenance Title</label><br>
    <input type="text" name="title" required><br><br>

    <label>Date</label><br>
    <input type="date" name="date"><br><br>

    <label>Description</label><br>
    <textarea name="description" rows="4" cols="40"></textarea><br><br>

    <label>Status</label><br>
    <select name="status">
      <option value="Scheduled">Scheduled</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select><br><br>

    <button type="submit">Save Maintenance</button>
  </form>

  <h2>Maintenance Records</h2>
  <ul>
    {{MAINTENANCE_LIST}}
  </ul>
</body>
</html>
