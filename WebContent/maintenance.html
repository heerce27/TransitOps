<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps Maintenance</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-shell">
    <div class="hero-card">
      <span class="eyebrow">Maintenance hub</span>
      <h1>Maintenance Module</h1>
      <p>Welcome, {{USER_NAME}}</p>
      <p>Role: {{USER_ROLE}}</p>
      <p>Email: {{USER_EMAIL}}</p>
      <div class="hero-actions">
        <a class="btn-secondary" href="dashboard.html">Back to Dashboard</a>
        <a class="btn-secondary" href="login.html">Logout</a>
      </div>
    </div>

    <div class="panel">
      <h2>Schedule Maintenance</h2>
      <div class="notice">{{MESSAGE}}</div>
      <form action="/maintenance" method="post">
        <div class="form-grid">
          <div><label>Vehicle</label><input type="text" name="vehicle" required></div>
          <div><label>Maintenance Title</label><input type="text" name="title" required></div>
          <div><label>Date</label><input type="date" name="date"></div>
          <div><label>Status</label><select name="status"><option value="Scheduled">Scheduled</option><option value="In Progress">In Progress</option><option value="Completed">Completed</option></select></div>
        </div>
        <div style="margin-top: 1rem;"><label>Description</label><textarea name="description" rows="4"></textarea></div>
        <div class="form-buttons"><button type="submit" class="btn-primary">Save Maintenance</button></div>
      </form>
    </div>

    <div class="panel">
      <h2>Maintenance Records</h2>
      <ul>{{MAINTENANCE_LIST}}</ul>
    </div>
  </div>
</body>
</html>
